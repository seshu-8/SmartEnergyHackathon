<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edge Energy Guardian</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
  <h1>Edge Energy Guardian ⚡</h1>

  <button id="voiceBtn">🎙 Enable Voice</button>
  <p id="voiceStatus">Voice: Off</p>
  <input id="cmd" placeholder="Type: status/current/power" />
<button id="askBtn">Ask</button>

  <hr>

  <p>Voltage: <b id="voltageVal">--</b> V</p>
  <p>Current: <b id="currentVal">--</b> A</p>
  <p>Power: <b id="powerVal">--</b> W</p>
  <p>Status: <b id="statusVal">--</b></p>
  <hr>

<p>Anomaly Type: <b id="anomalyVal">--</b></p>
<p>Health Score: <b id="healthVal">--</b> / 100</p>
<p>Recommendation: <b id="recommendVal">--</b></p>

  <!-- IMPORTANT: script.js must load -->
  <script src="script.js"></script>
 </div>
</body>
</html>
