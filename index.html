<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Energy AI Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Smart Energy Monitoring System</h1>
        <p>AI Powered Real-Time Energy Intelligence</p>
    </header>

    <section class="dashboard">

        <div class="card">
            <h2>Sensor Data</h2>
            <p>Voltage: <span id="voltage">0</span> V</p>
            <p>Current: <span id="current">0</span> A</p>
            <p>Power: <span id="power">0</span> W</p>
        </div>

        <div class="card">
            <h2>Health Score</h2>
            <h3 id="healthScore">100%</h3>
        </div>

        <div class="card">
            <h2>Anomaly Detection</h2>
            <p id="anomalyStatus">Normal</p>
        </div>

        <div class="card">
            <h2>Smart Recommendation</h2>
            <p id="recommendation">System operating efficiently</p>
        </div>

        <div class="card">
            <h2>Voice Control</h2>
            <button onclick="startVoice()">Activate Voice Command</button>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
